publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  web_socket_channel: ^2.4.0
  intl: ^0.20.2
  fl_chart: ^0.66.0
  provider: ^6.1.1
  http: ^1.6.0
  flutter_staggered_grid_view: ^0.7.0
